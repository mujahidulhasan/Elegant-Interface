<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Clipvlt — Universal Media Downloader</title>
    <meta name="description" content="Clipvlt lets you download video, audio, and thumbnails from dozens of platforms — fast, clean, and free." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Clipvlt — Universal Media Downloader" />
    <meta property="og:description" content="Download video, audio, and thumbnails from dozens of platforms." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clipvlt — Universal Media Downloader" />
    <meta name="twitter:description" content="Download video, audio, and thumbnails from dozens of platforms." />
    <link rel="icon" type="image/png" href="/site/favicon.png" id="dynamic-favicon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/66ce5ae449.js" crossorigin="anonymous"></script>
    <!-- Site settings: edit /site/settings.js to update branding without a code rebuild -->
    <script src="/site/settings.js" onerror="void 0"></script>
    <script>
      // Apply favicon from settings if present
      try {
        var s = window.__SITE_SETTINGS__;
        if (s && s.favicon) {
          var el = document.getElementById('dynamic-favicon');
          if (el) el.href = s.favicon;
        }
      } catch(e){}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
